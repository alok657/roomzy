<!DOCTYPE html>
<html>

<head>

<title>PG Details</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f9;
}

.navbar{
background:#1e88e5;
color:white;
padding:15px;
}

.container{
width:90%;
margin:20px auto;
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.left{
background:white;
padding:20px;
border-radius:10px;
}

.left h2{
margin-top:10px;
}

.left p{
color:#555;
}

/* ✅ IMAGE BOX FIX */
.img-box{
position:relative;
}

/* ✅ MAIN IMAGE FIX */
.main-img{
width:100%;
height:280px;
object-fit:cover;
border-radius:10px;
display:block;
}

/* ✅ HEART STYLE */
#heart{
position:absolute;
top:10px;
right:10px;
font-size:26px;
cursor:pointer;
background:white;
padding:6px;
border-radius:50%;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

/* ✅ GALLERY FIX */
.gallery{
display:flex;
gap:10px;
margin-top:10px;
}

.gallery:empty{
display:none;
}

.gallery img{
width:80px;
height:60px;
border-radius:6px;
cursor:pointer;
}

.right{
display:flex;
flex-direction:column;
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
}

.card button{
margin-top:10px;
}

button{
width:100%;
padding:10px;
background:#1e88e5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.features{
margin-top:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
}

.features p{
background:#eef4ff;
padding:10px;
border-radius:10px;
font-size:14px;
font-weight:500;
}

</style>

</head>

<body>

<div class="navbar">🏠 Roomzy</div>

<div class="container">

<div class="left">

<!-- ✅ IMAGE + HEART -->
<div class="img-box">
<img id="mainImg" class="main-img">

<span id="heart" onclick="toggleSave()">🤍</span>
</div>

<!-- ✅ GALLERY -->
<div class="gallery" id="gallery"></div>

<h2 id="name"></h2>
<p id="city"></p>
<h3 id="rent"></h3>

<h3>Description</h3>
<p id="desc"></p>

<h3>✨ Features</h3>

<div class="features">
<p>📶 Free WiFi</p>
<p>🍽️ Food Included</p>
<p>❄️ AC Rooms</p>
<p>🧹 Daily Cleaning</p>
</div>

</div>

<div class="right">

<div class="card">
<h3>👤 Owner Details</h3>
<p><b>Name:</b> <span id="ownerName"></span></p>
<p><b>Contact:</b> <span id="ownerPhone"></span></p>

<button onclick="callOwner()">Call Owner</button>
<button onclick="showForm()">📅 Book Now</button>

<div id="bookingForm" style="display:none; margin-top:10px;">

<input id="b_name" placeholder="Your Name" style="width:100%; padding:8px; margin:5px 0;">
<input id="b_phone" placeholder="Phone Number" style="width:100%; padding:8px; margin:5px 0;">
<input id="b_date" type="date" style="width:100%; padding:8px; margin:5px 0;">

<button onclick="confirmBooking()">Confirm Booking</button>

</div>

<button onclick="deletePG()" style="background:red; margin-top:10px;">
❌ Delete PG
</button>

<p id="deleteMsg" style="
display:none;
color:red;
font-weight:bold;
margin-top:10px;
"></p>

<p id="bookMsg" style="
display:none;
color:green;
font-weight:bold;
margin-top:10px;
"></p>
</div>

<h3>Add Review</h3>

<input id="reviewInput" placeholder="Write your review..." style="width:100%; padding:8px; margin-top:5px;">
<br><br>

<select id="rating">
<option value="5">⭐ 5</option>
<option value="4">⭐ 4</option>
<option value="3">⭐ 3</option>
<option value="2">⭐ 2</option>
<option value="1">⭐ 1</option>
</select>

<br><br>

<button onclick="addReview()">Submit Review</button>

<div id="reviewList" style="margin-top:10px;"></div>

<div class="card">
<h3>Reviews ⭐</h3>
<p>⭐ 4.5 Comfortable stay</p>
<p>⭐ 4.2 Clean rooms</p>
</div>

</div>

</div>

<script>

let id = new URLSearchParams(window.location.search).get("id")

fetch("https://roomzy-czyc.onrender.com/get_pg/" + id)
.then(res => res.json())
.then(data => {

console.log("DATA:", data)

let main = document.getElementById("mainImg")
let gallery = document.getElementById("gallery")

// ✅ MAIN IMAGE (FIXED AS PER YOUR FILES)
main.src = `https://roomzy-czyc.onrender.com/static/images/pg${id}.jpg`


// ✅ GALLERY (pgX_1, pgX_2, pgX_3)
gallery.innerHTML = ""

for(let i=1; i<=3; i++){

let img = `https://roomzy-czyc.onrender.com/static/images/pg${id}_${i}.jpg`

gallery.innerHTML += `
<img src="${img}" onclick="changeImg('${img}')"
onerror="this.style.display='none'">
`

}


// ✅ TEXT DATA
document.getElementById("name").innerText = data.pg_name || "No Name"
document.getElementById("city").innerText = data.city || "Delhi"
document.getElementById("rent").innerText = "₹ " + (data.rent || "0")
document.getElementById("desc").innerText = data.description || "Nice PG"


// ✅ OWNER NAME FIX (REAL NAMES)
let owners = [
"Amit Sharma","Rahul Verma","Priya Singh","Ankit Gupta","Neha Kapoor",
"Rohit Yadav","Pooja Mehta","Karan Malhotra","Simran Kaur","Vikas Jain",
"Sneha Reddy","Arjun Patel","Nisha Arora","Manish Saxena","Deepak Chauhan"
]

document.getElementById("ownerName").innerText = owners[id-1] || "Owner"


// ✅ PHONE FIX (MASKED BUT REAL)
let phones = [
"9812345670","9823456781","9834567892","9845678903","9856789014",
"9867890125","9878901236","9889012347","9890123458","9801234569",
"9811122233","9822233344","9833344455","9844455566","9855566677"
]

let phone = phones[id-1] || "9999999999"
let masked = phone.slice(0,3) + "xxxx" + phone.slice(-3)

document.getElementById("ownerPhone").innerText = masked

})
.catch(err=>{
console.log("ERROR:", err)
alert("Error loading PG 😢")
})


// ✅ IMAGE CHANGE
function changeImg(src){
document.getElementById("mainImg").src = src
}


// ✅ CALL OWNER
function callOwner(){
let phone = document.getElementById("ownerPhone").innerText
window.location.href = "tel:" + phone
}

function toggleSave(){
let id = new URLSearchParams(window.location.search).get("id")

let name = document.getElementById("name").innerText
let city = document.getElementById("city").innerText
let rent = document.getElementById("rent").innerText
let img = document.getElementById("mainImg").src

let saved = JSON.parse(localStorage.getItem("saved")) || []
let heart = document.getElementById("heart")

let exists = saved.find(p => p.id == id)

if(exists){
saved = saved.filter(p => p.id != id)
heart.innerText = "🤍"
}else{
saved.push({id,name,city,rent,img})
heart.innerText = "❤️"
}

localStorage.setItem("saved", JSON.stringify(saved))
}

window.onload = function(){
let id = new URLSearchParams(window.location.search).get("id")
let saved = JSON.parse(localStorage.getItem("saved")) || []
let heart = document.getElementById("heart")

if(saved.find(p => p.id == id)){
heart.innerText = "❤️"
}
}

function addReview(){

let text = document.getElementById("reviewInput").value.trim()
let rating = document.getElementById("rating").value

if(text === ""){
alert("Write something first 😅")
return
}

let id = new URLSearchParams(window.location.search).get("id")

let reviews = JSON.parse(localStorage.getItem("reviews")) || {}

if(!reviews[id]){
reviews[id] = []
}

reviews[id].push({
text,
rating
})

localStorage.setItem("reviews", JSON.stringify(reviews))

document.getElementById("reviewInput").value = ""

loadReviews()
}

function loadReviews(){

let id = new URLSearchParams(window.location.search).get("id")

let reviews = JSON.parse(localStorage.getItem("reviews")) || {}

let list = document.getElementById("reviewList")

list.innerHTML = ""

if(!reviews[id]){
list.innerHTML = "<p>No reviews yet 😅</p>"
return
}

reviews[id].forEach(r=>{
list.innerHTML += `
<p>⭐ ${r.rating} - ${r.text}</p>
`
})
}

loadReviews()

function deletePG(){

let id = new URLSearchParams(window.location.search).get("id")

fetch("https://roomzy-czyc.onrender.com/delete_pg/" + id,{
method:"DELETE"
})
.then(res=>res.json())
.then(data=>{
window.location.href = "student_home.html"
})
.catch(err=>{
console.log("Delete error:", err)
})

}

// 🔥 FIXED FUNCTIONS (OUTSIDE)
function showForm(){
document.getElementById("bookingForm").style.display = "block"
}

function confirmBooking(){

let name = document.getElementById("b_name").value.trim()
let phone = document.getElementById("b_phone").value.trim()
let date = document.getElementById("b_date").value

if(name=="" || phone=="" || date==""){
alert("Fill all details")
return
}

let id = new URLSearchParams(window.location.search).get("id")
let pgName = document.getElementById("name").innerText
let city = document.getElementById("city").innerText
let rent = document.getElementById("rent").innerText
let img = document.getElementById("mainImg").src

let bookings = JSON.parse(localStorage.getItem("bookings")) || []

bookings.push({
id,
pgName,
city,
rent,
img,
name,
phone,
date
})

localStorage.setItem("bookings", JSON.stringify(bookings))

alert("✅ Booking Confirmed")

window.location.href = "bookings.html"

}

</script>

</body>
</html>
